<div>
  <style>
    .start-button {
      animation: pulse 1s linear infinite;
    }
    .in-tune {
      color: #82ff69;
    }
    .out-of-tune {
      color: #ff6e04;
    }
    @keyframes pulse {
      50% {
        transform: scale(1.05);
      }
    }
    .meter-needle {
      transition: transform 0.1s linear;
    }
    .tool-wrapper svg {
      max-width: 100%;
      height: auto;
    }
    .results {
      font-family: var(--font-family);
      color: var(--accent);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    @media (min-width: 600px) {
      .results {
        transform: translate(-50%, -50%) scale(1.5);
      }
    }
    .results .note {
      font-size: 3rem;
      color: var(--text);
    }
    .active-note {
      fill: var(--bg-light2);
      transition: fill 0.25s;
    }
    .results .note .exact,
    .active-note.exact,
    span.in-tune {
      color: #82ff69;
      fill: hsl(110, 100%, 25%);
    }
    .light-theme .results .note .exact,
    .light-theme .active-note.exact {
      fill: hsl(110, 100%, 75%);
    }
    .results .note .out-of-tune,
    .active-note.out-of-tune,
    span.out-of-tune {
      color: #ff6e04;
      fill: hsl(25.3, 100%, 25%);
    }
    .light-theme .results .note .out-of-tune,
    .light-theme .active-note.out-of-tune {
      fill: hsl(25.3, 100%, 75%);
    }
    .wheel-wrapper {
      fill: var(--bg-light);
    }
    .light-theme .wheel-wrapper {
      fill: var(--bg-dark-alt);
    }
  </style>
</div>

  <div class="controls mb-12">
    <button x-show="!$store.mmm.tunerStarted" @click="$store.mmm.tunerStarted = startTuner();" id="start-tuner" class="btn accent text-2xl" :class="$store.mmm.tunerStarted ? 'stop-button' : 'start-button'">

<script type="module">
  import { PitchDetector } from '/js/pitchy.min.js';

  function startTuner() {
    audioContext.resume();

    navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
      window.stream = stream;
      audioContext.createMediaStreamSource(stream).connect(analyserNode);
      const detector = PitchDetector.forFloat32Array(analyserNode.fftSize);
      const input = new Float32Array(detector.inputLength);
      updatePitch(analyserNode, detector, input, audioContext.sampleRate);
    });

    return true;
  }
  window.startTuner = startTuner;
</script>

<script>
  const audioContext = new window.AudioContext();
  const analyserNode = audioContext.createAnalyser();

  document.addEventListener('alpine:init', () => {
    Alpine.store('mmm', {
      tunerStarted: false,
      instrument: 'acoustic-guitar',
      pitch: 0,
      getNoteSimple() {
        return Tonal.Note.fromFreq(this.pitch).slice(0, -1);
      },
      getNote() {
        const base = Tonal.Note.fromFreq(this.pitch);
        const sharp = Tonal.Note.fromFreqSharps(this.pitch);

        if (base === sharp) {
          return base.replace('b', '<sub>♭</sub>').replace('#', '<sup>♯</sup>');
        } else {
          return `${sharp.slice(0, -1)}/${base}`
            .replaceAll('b', '<sub>♭</sub>')
            .replaceAll('#', '<sup>♯</sup>');
        }
      },
      getCents() {
        const exactFreq = Tonal.Note.freq(Tonal.Note.fromFreq(this.pitch));

        const centDifference = (
          1200 * Math.log2(this.pitch / exactFreq)
        ).toFixed(2);

        return centDifference;
      },
      inTune: false,
      inTuneExact: false,
    });
  });

  let currentTuner;
  function updatePitch(analyserNode, detector, input, sampleRate) {
    analyserNode.getFloatTimeDomainData(input);
    const [pitch, clarity] = detector.findPitch(input, sampleRate);

    let meetThreshold = pitch >= 20 && pitch <= 10000 && clarity >= 0.9;
    if (meetThreshold) {
      Alpine.store('mmm').pitch = Math.round(pitch * 10) / 10;
    }

    currentTuner = setTimeout(
      () => updatePitch(analyserNode, detector, input, sampleRate),
      100
    );
  }

  function stopTuner() {
    if (currentTuner) {
      clearTimeout(currentTuner);
    }
    if (window.stream) {
      const tracks = window.stream.getTracks();

      tracks.forEach(function (track) {
        track.stop();
      });
    }
    Alpine.store('mmm').pitch = 0;
    Alpine.store('mmm').inTune = false;
    Alpine.store('mmm').inTuneExact = false;

    return false;
  }
</script>
